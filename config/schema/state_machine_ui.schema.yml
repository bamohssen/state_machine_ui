state_machine_ui.workflow_group.*:
  type: config_entity
  label: 'Workflow Group'
  mapping:
    id:
      type: string
      label: 'Machine name'
    label:
      type: label
      label: 'Label'
    langcode:
      type: langcode
      label: 'Language code'
    entity_type:
      type: string
      label: 'Entity type ID'

state_machine_ui.metadata_schema.*:
  type: config_entity
  label: 'Workflow Metadata Schema'
  mapping:
    id:
      type: string
      label: 'Machine name'
    label:
      type: label
      label: 'Label'
    langcode:
      type: langcode
      label: 'Language code'
    field_definitions:
      type: sequence
      label: 'Field definitions'
      sequence:
        type: mapping
        label: 'Field definition'
        mapping:
          key:
            type: string
            label: 'Machine name'
          label:
            type: label
            label: 'Label'
          type:
            type: string
            label: 'Field type'
          description:
            type: text
            label: 'Help text'

state_machine_ui.workflow.*:
  type: config_entity
  label: 'State Machine Workflow'
  mapping:
    id:
      type: string
      label: 'Machine name'
    label:
      type: label
      label: 'Label'
    langcode:
      type: langcode
      label: 'Language code'
    description:
      type: text
      label: 'Description'
    group:
      type: string
      label: 'Workflow group ID'
    default_state:
      type: string
      label: 'Default (initial) state machine name'
    state_metadata_schema:
      type: string
      label: 'State metadata schema ID'
    transition_metadata_schema:
      type: string
      label: 'Transition metadata schema ID'
    states:
      type: sequence
      label: 'States'
      sequence:
        type: mapping
        label: 'State'
        mapping:
          key:
            type: string
            label: 'Machine name'
          label:
            type: label
            label: 'Label'
          description:
            type: text
            label: 'Description'
          weight:
            type: integer
            label: 'Weight'
          fields:
            type: ignore
            label: 'Custom field values'

state_machine_ui.transition.*:
  type: config_entity
  label: 'Workflow Transition'
  mapping:
    id:
      type: string
      label: 'Machine name'
    label:
      type: label
      label: 'Label'
    langcode:
      type: langcode
      label: 'Language code'
    workflow:
      type: string
      label: 'Workflow ID'
    key:
      type: string
      label: 'Transition key'
    from:
      type: sequence
      label: 'From states'
      sequence:
        type: string
        label: 'State key'
    to:
      type: string
      label: 'To state'
    weight:
      type: integer
      label: 'Weight'
    fields:
      type: ignore
      label: 'Custom field values'

field.widget.settings.state_field_rules:
  type: mapping
  label: 'State field rules widget settings'
  mapping:
    is_required:
      type: boolean
      label: 'Is required'
    select_label:
      type: string
      label: 'Select label'
    show_empty_option:
      type: boolean
      label: 'Show empty option'
    empty_option_label:
      type: string
      label: 'Empty option label'
    option_label_source:
      type: string
      label: 'Option label source'
      constraints:
        Choice:
          - state
          - transition
    comment_mode:
      type: string
      label: 'Comment mode'
      constraints:
        Choice:
          - disabled
          - optional
          - required
    comment_label:
      type: string
      label: 'Comment label'
    check_transition_access:
      type: boolean
      label: 'Check per-transition permission'
    no_transition_behavior:
      type: string
      label: 'No transition behavior'
    no_transition_message:
      type: string
      label: 'No transition message'
    conditions:
      type: sequence
      label: 'Conditional rules'
      sequence:
        type: mapping
        label: 'Rule'
        mapping:
          state:
            type: string
            label: 'Target state ID'
          field:
            type: string
            label: 'Target field name'
          visibility:
            type: string
            label: 'Visibility'
            constraints:
              Choice:
                - show
                - hide
          required:
            type: boolean
            label: 'Required'
    state_filters:
      type: mapping
      label: 'State metadata filters'
    transition_filters:
      type: mapping
      label: 'Transition metadata filters'
    filter_logic:
      type: string
      label: 'Filter logic between keys (and/or)'
    show_workflow_diagram:
      type: boolean
      label: 'Show workflow diagram'
    show_history:
      type: boolean
      label: 'Show transition history'
    history_limit:
      type: integer
      label: 'History entries to display'
