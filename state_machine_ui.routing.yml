    _title: 'Add workflow'
  requirements:
    _permission: 'administer state machine workflows'

entity.workflow_state_machine.edit_form:
  path: '/admin/config/workflow/state-machine/{workflow_state_machine}'
  defaults:
    _entity_form: 'workflow_state_machine.edit'
    _title: 'Edit workflow'
  requirements:
    _permission: 'administer state machine workflows'

entity.workflow_state_machine.delete_form:
  path: '/admin/config/workflow/state-machine/{workflow_state_machine}/delete'
  defaults:
    _entity_form: 'workflow_state_machine.delete'
    _title: 'Delete workflow'
  requirements:
    _permission: 'administer state machine workflows'

entity.workflow_metadata_schema.collection:
  path: '/admin/config/workflow/state-machine/metadata-schemas'
  defaults:
    _entity_list: 'workflow_metadata_schema'
    _title: 'Metadata schemas'
  requirements:
    _permission: 'administer state machine workflows'

entity.workflow_metadata_schema.add_form:
  path: '/admin/config/workflow/state-machine/metadata-schemas/add'
  defaults:
    _entity_form: 'workflow_metadata_schema.add'
    _title: 'Add metadata schema'
  requirements:
    _permission: 'administer state machine workflows'

entity.workflow_metadata_schema.edit_form:
  path: '/admin/config/workflow/state-machine/metadata-schemas/{workflow_metadata_schema}'
  defaults:
    _entity_form: 'workflow_metadata_schema.edit'
    _title: 'Edit metadata schema'
  requirements:
    _permission: 'administer state machine workflows'

entity.workflow_metadata_schema.delete_form:
  path: '/admin/config/workflow/state-machine/metadata-schemas/{workflow_metadata_schema}/delete'
  defaults:
    _entity_form: 'workflow_metadata_schema.delete'
    _title: 'Delete metadata schema'
