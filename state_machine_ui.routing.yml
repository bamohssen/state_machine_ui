    _permission: 'administer state machine workflows'

entity.workflow_transition.collection:
  path: '/admin/config/workflow/state-machine/{workflow_state_machine}/transitions'
  defaults:
    _controller: '\Drupal\state_machine_ui\Controller\WorkflowTransitionListController::list'
    _title_callback: '\Drupal\state_machine_ui\Controller\WorkflowTransitionListController::title'
  requirements:
    _permission: 'administer state machine workflows'

entity.workflow_transition.add_form:
  path: '/admin/config/workflow/state-machine/{workflow_state_machine}/transitions/add'
  defaults:
    _entity_form: 'workflow_transition.add'
    _title: 'Add transition'
  requirements:
    _permission: 'administer state machine workflows'

entity.workflow_transition.edit_form:
  path: '/admin/config/workflow/state-machine/{workflow_state_machine}/transitions/{workflow_transition}'
  defaults:
    _entity_form: 'workflow_transition.edit'
    _title: 'Edit transition'
  requirements:
    _permission: 'administer state machine workflows'
  options:
    parameters:
      workflow_transition:
        type: entity:workflow_transition

entity.workflow_transition.delete_form:
  path: '/admin/config/workflow/state-machine/{workflow_state_machine}/transitions/{workflow_transition}/delete'
  defaults:
    _entity_form: 'workflow_transition.delete'
    _title: 'Delete transition'
  requirements:
    _permission: 'administer state machine workflows'
  options:
    parameters:
      workflow_transition:
        type: entity:workflow_transition
